- name: "CIS 1.8 - Configure GNOME Display Manager"
  tags:
    - cis_1.8
  block:

    # 1.8.1 - Remove GDM (preferred)
    - name: "Ensure GDM is removed"
      ansible.builtin.dnf:
        name: gdm
        state: absent
      when: cis_remove_gdm | bool
      tags:
        - cis_1.8.1
        - level1

    # Gather facts if we might configure it
    - name: gather package facts
      ansible.builtin.package_facts:
      when: not cis_remove_gdm | bool

    - name: "Ensure dconf directories exist"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/dconf/db/gdm.d
        - /etc/dconf/db/gdm.d/locks
      when: not cis_remove_gdm | bool 

    # Everything below applies only if GDM is kept
    - name: "Configure GDM if installed"
      when:
        - not cis_remove_gdm | bool
        - "'gdm' in ansible_facts.packages"
      block:

        # 1.8.2 - Banner
        - name: "Ensure GDM login banner is configured"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/01-banner-message
            content: |
              [org/gnome/login-screen]
              banner-message-enable=true
              banner-message-text='{{cis_warning_banner}}'
          tags:
            - cis_1.8.2

        # 1.8.3 - Disable user list
        - name: "Enable GDM disable-user-list is enabled"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/00-login-screen
            content: |
              [org/gnome/login-screen]
              disable-user-list=true
          tags:
            - cis_1.8.3

        # 1.8.4 + 1.8.5 - Screen Lock
        - name: "Ensure screen lock is configured"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/00-screensaver
            content: |
              [org/gnome/desktop/session]
              idle-delay=uint32 900

              [org/gnome/desktop/screensaver]
              lock-enabled=true
              lock-delay=uint32 5
          tags:
            - cis_1.8.4
            - cis_1.8.5

        # 1.8.6 + 1.8.7 - Disable automount
        - name: "Disable automount of removable media"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/00-media-automount
            content: |
              [org/gnome/desktop/media-handling]
              automount=false
              automount-open=false
          tags:
            - cis_1.8.6
            - cis_1.8.7

        # 1.8.8 + 1.8.9 - Disable autorun
        - name: "Disable autorun"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/00-media-autorun
            content: |
              [org/gnome/desktop/media-handling]
              autorun-never=true
          tags:
            - cis_1.8.8
            - cis_1.8.9

        # 1.8.10 - Disable XDMCP
        - name: "Ensure XDMCP is disabled"
          ansible.builtin.ini_file:
            path: /etc/gdm/custom.conf
            section: xdmcp
            option: Enable
            value: 'false'
          tags:
            - cis_1.8.10

        - name: "Lock GDM settings"
          ansible.builtin.copy:
            dest: /etc/dconf/db/gdm.d/locks/00-security-settings
            content: |
              /org/gnome/login-screen/banner-message-enable
              /org/gnome/login-screen/disable-user-list
              /org/gnome/desktop/screensaver/lock-enabled
              /org/gnome/desktop/media-handling/automount
              /org/gnome/desktop/media-handling/autorun-never   
          tags:
            - cis_1.8_locking
   
        # Apply dconf changes
        - name: "Update dconf database"
          ansible.builtin.command: dconf update
          changed_when: false
          tags:
            - cis_1.8
