---
- name: configure chrony servers
  copy:
    dest: /etc/chrony.conf
    content: |
      # Use NTS-enabled time servers
      server time.cloudflare.com iburst nts
      server nts.netnod.se iburst nts
      server ptbtime1.ptb.de iburst nts
      
      # Disable command interface
      cmdport 0

      # Allow local system clock fallback
      driftfile /var/lib/chrony/drift

      # Step clock if offset is large at startup
      makestep 1.0 3

      # Enable logging
      /var/log/chrony
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony

- name: Enable and start chrony
  service:
    name: chronyd
    state: started
    enabled: true  

- name: Force initial secure sync
  command: chronyc -a makestep
