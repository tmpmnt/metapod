---
- name: Update installed packages
  dnf: 
    name: '*'
    state: latest

- name: Install fail2ban
  dnf:
    name:
      - fail2ban
      - google-authenticator
      - firewalld
      - chrony
      - policycoreutils-python-utils
      - python3-libselinux
      - python3-libsemanage
    state: present
