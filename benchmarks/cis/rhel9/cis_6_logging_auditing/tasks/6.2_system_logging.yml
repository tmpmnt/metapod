# NOTE: CIS Benchmark Recommendation 6.2.1.4 suggests the use of only one logging system hence the removal of rsyslogd

- name: "CIS 6.2.1.1 - Ensure journald is enabled and active"
  ansible.builtin.systemd:
    name: systemd-journald
    enabled: yes
    state: started
  tags:
    - cis_6.2.1.1

- name: "CIS 6.2.1.2 - Ensure journald log access is configured"
  ansible.builtin.file:
    path: /var/log/journal
    owner: root
    group: systemd-journal
    mode: '2750'
    state: directory
  tags:
    - cis_6.2.1.2

# Optional: Ensure journald uses persistent storage - not part of CIS Benchmarks"

 - name: "journald persistent storage"
   ansible.builtin.lineinfile:
     path: /etc/systemd/journald.conf
     regexp: '^Storage='
     line: 'Storage=persistent'
     create: yes
   notify: Restart journald
   tags:
   - cis_6.2_persistence

- name: "CIS 6.2.1.3 - Configure journald log rotation"
  ansible.builtin.blockinfile:
    path: /etc/systemd/journald.conf
    block: |
      SystemMaxUse={{ cis_journald_max_use | default('1G') }}
      SystemKeepFree={{ cis_journald_keep_free | default('500M') }}
      MaxFileSec={{ cis_journald_max_file_sec | default ('1month') }}
    create: yes
  notify: Restart journald
  tags:
    - cis_6.2.1.3

- name: "CIS 6.2.1.4 - Ensure rsyslog is not installed"
  ansible.builtin.dnf:
    name: rsyslog
    state: absent
  tags:
    - cis_6.2.1.4
