- name: "CIS 1.3.1 - Configure SELinux"
  tags: 
    - cis_1.3.1
  block:

    # 1.3.1.1
    - name: "Ensure SELinux packages are installed"
      ansible.builtin.dnf:
        name: 
          - libselinux
          - policycoreutils
        state: present
      tags:
        - cis_1.3.1.1
        - level1

    # 1.3.1.2
    - name: "Ensure SELinux is not disabled in bootloader"
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: 'selinux=0'
        replace: 'selinux=1'
      tags:
        - cis_1.3.1.2
        - level1

    # Optional: Rebuild grub if changed
    - name: "Rebuild grub config if needed"
      ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
      when: ansible_facts['os_family'] == 'RedHat'
      changed_when: false
      tags:
        - cis_1.3.1.2

    # 1.3.1.3
    - name: "Ensure SELinux policy is targeted"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUXTYPE='
        line: 'SELINUXTYPE=targeted'
      tags:
        - cis_1.3.1.3
        - level1

    # 1.3.1.4 + 1.3.1.5
    - name: "Ensure SELinux is enforcing"
      ansible.builtin.selinux:
        policy: targeted
        state: enforcing
      tags:
        - cis_1.3.1.4
        - cis_1.3.1.5
        - level1

    # 1.3.1.6 (Manual)
    - name: "Check for unconfined services"
      ansible.builtin.command: ps -eZ | grep unconfined_service_t
      register: unconfined_services
      changed_when: false
      failed_when: false
      tags:
        - cis_1.3.1.6
        - manual

    - name: "Report unconfined services"
      ansible.builtin.debug:
        msg: >
          Unconfined services detected: {{ unconfined_services.stdout_lines }}
      when: unconfined_services.stdout != ""
      tags:
        - cis_1.3.1.6
        - manual

    # 1.3.1.7       
    - name: "Ensure mcstrans is not installed"
      ansible.builtin.dnf
        name: mcstrans
        state: absent
      tags:
        - cis_1.3.1.7
        - level1

    # 1.3.1.8
    - name: "Ensure setroubleshoot is not installed"
      ansible.builtin.dnf:
        name: setroubleshoot
        state: absent
      tags:
        - cis_1.3.1.8
        - level1  
