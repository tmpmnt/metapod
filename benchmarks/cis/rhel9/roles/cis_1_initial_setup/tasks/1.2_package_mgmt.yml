- name: "CIS 1.2.1 - Configure Package Repositories"
  tags:
    - cis_1.2.1
  block:

    - name: "CIS 1.2.1.2 - Ensure gpgcheck is globally activated "
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '^gpgcheck='
        line: 'gpgcheck=1'
        create: yes
      tags:
        - cis_1.2.1.2
        - level1

    - name: "CIS 1.2.1.3 - Ensure repo_gpgcheck is globally activated"
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '^repo_gpgcheck='
        line: 'repo_gpgcheck=1'
        create: yes
      tags:
        - cis_1.2.1.3
        - level1

    - name: "CIS 1.2.1.X - Ensure all repo files enforce gpgcheck"
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '^gpgcheck=0'
        replace: 'gpgcheck=1'
      loop: "{{ lookup('fileglob', '/etc/yum.repos.d/*.repo', wantlist=True) }}"
      tags:
        - cis_1.2_repo_files

    - name: "CIS 1.2.1.X - Ensure repo_gpgcheck enabled in repo files"
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^repo_gpgcheck='
        line: 'repo_gpgcheck=1'
        create: yes
      loop: " {{ lookup('fileglob', '/etc/yum.repos.d/*.repo', wantlist=True) }}"
      tags:
        - cis_1.2_repo_files

    - name: "Ensure GPG keys are valid for all repositories"
      ansible.builtin.command:
        cmd: rpm -qi {{ item.repo_gpgkey }}
      loop: "{{ lookup('fileglob', '/etc/yum.repos.d/*.repo', wantlist=True) }}"
      when: item.repo_gpgkey is defined
      register: gpg_key_check
      failed_when: gpg_key_check.rc != 0
 
    - name: "Ensure only trusted repositories exist"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ lookup('fileglob', '/etc/yum.repos.d/*.repo', wantlist=True) }}"
      when: item not in trusted_repos

- name: "CIS 1.2.2 - Configure Package Updates"
  tags:
    - cis_1.2.2
  block:

    - name: "CIS 1.2.2.1 - Check for available updates"
      ansible.builtin.command: dnf check-update
      register: dnf_updates
      changed_when: false
      failed_when: false
      tags:
        - cis_1.2.2.1
        - audit

    - name: "CIS 1.2.2.1 - Report available updates"
      ansible.builtin.debug:
        msg: >
          Updates available. Review patching policy.
          Output: {{ dnf_updates.stdout_lines }}
      when: dnf_updates.rc == 100
      tags:
        - cis_1.2.2.1
        - audit

    - name: "CIS 1.2.2.1 - No updates available"
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: cis_apply_updates | default(false) | bool
      tags:
        - cis_1.2.2.1
        - remediation
