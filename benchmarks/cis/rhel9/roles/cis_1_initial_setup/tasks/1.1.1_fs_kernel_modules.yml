# roles/cis_1_initial_setup/tasks/1.1.1_fs_kernel_modules.yml
# disabled_filesystems variable file: roles/cis_1_initial_setup/vars/main.yml

# NOTE:
# The disabled_filesystems list reduces kernel attack surface by preventing
# unused filesystem modules from loading. Some modules (e.g., squashfs for
# containers or usb-storage for removable media) may be required depending
# on system role. Adjust this list based on operational requirements.

- name: "CIS 1.1.1 - Disable unused filesystem kernel modules"
  tags:
    - cis_1.1.1
    - level1

  block:

    - name: "Ensure filesystem kernel modules are disabled"
      ansible.builtin.blockinfile: 
        path: "/etc/modprobe.d/{{ item }}.conf"
        create: yes
        mode: '0644'
        block: |
          install {{ item }} /bin/true
          blacklist {{ item }}
      loop: "{{ disabled_filesystems }}"

    - name: "Ensure filesystem kernel modules are not currently loaded"
      ansible.builtin.command: "modprobe -r {{ item }}"
      register: modprobe_remove
      failed_when: false
      changed_when: modprobe_remove.rc == 0
      loop: "{{ disabled_filesystems }}"
      tags: 
        - cis_1.1.1

- name: "CIS 1.1.1.9 - Manual review for additional unused filesystems"
  debug:
    msg: "Manual step required: review additional unused filesystem kernel modules"
  tags:
    - cis_1.1.1.9
    - manual
