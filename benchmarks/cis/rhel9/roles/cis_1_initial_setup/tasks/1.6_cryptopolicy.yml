- name: "CIS 1.6 - Configure System Wide Crypto Policy"
  tags:
    - cis_1.6
  block:

    # 1.6.1
    - name: "Ensure crypto policy is not LEGACY"
      ansible.builtin.command: update-crypto-policies --show
      register: crypto_policy
      changed_when: false
      tags:
        - cis_1.6.1
        - audit

    - name: "Set crypto policy to DEFAULT"
      ansible.builtin.command: update-crypto-policies --set DEFAULT
      when: crypto_policy.stdout == "LEGACY"
      tags:
        - cis_1.6.1
        - remediation

    - name: "Ensure SSH does not override crypto policy"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^(Ciphers|MACs|KexAlgorithms)'
        state: absent
      notify: Restart sshd
      tags:
        - cis_1.6.2
        - level1

    # 1.6.3      
    - name: "Ensure SHA1 is disabled (FUTURE policy)"
      ansible.builtin.command: update-crypto-policies --set FUTURE
      when: cis_crypto_policy_level | default('DEFAULT') == "FUTURE"
      tags:
        - cis_1.6.3
        - level2

    # 1.6.4 + 1.6.5 (handled via policy)
    - name: "Ensure strong crypto policy is applied"
      ansible.builtin.command: >
        update-crypto-policies --set {{ cis_crypto_policy_level | default('DEFAULT') }}
      tags:
        - cis_1.6.4
        - cis_1.6.5

    # 1.6.6 (Manual)
    - name: "Check for chacha20-poly1305 usage in SSH"
      ansible.builtin.command: grep -i chacha20 /etc/ssh/sshd_config
      register: chacha_check
      changed_when: false
      failed_when: false
      tags:
        - cis_1.6.6
        - manual

    - name: "Report chacha usage"
      ansible.builtin.debug:
        msg: "Manual review: chacha20-poly1305 may be enabled"
      when: chacha_check.stdout != ""
      tags:
        - cis_1.6.6
        - manual

    # 1.6.7 (Manual)
    - name: "Check for EtM MACs"
      ansible.builtin.command: grep -i etm /etc/ssh/sshd_config
      register: etm_check
      changed_when: false
      failed_when: false
      tags:
        - cis_1.6.7
        - manual

    - name: "Report EtM usage"
      ansible.builtin.debug:
        msg: "Manual review: Encrypt-then-MAC(EtM) algorithms may be enabled"
      when: etm_check.stdout != ""
      tags:
        - cis_1.6.7
        - manual 
