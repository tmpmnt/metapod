- name: "CIS 6.3.2.1 - Ensure audit log storage size is configured"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file ='
    line: 'max_log_file = {{ cis_auditd_max_log_file | default(100) }}'
  notify: Restart auditd
  tags:
    - cis_6.3.2.1

- name: "CIS 6.3.2.2 - Ensure audit logs are not automatically deleted"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file_action ='
    line: 'max_log_file_action = keep_logs'
  notify: Restart auditd
  tags:
    - cis_6.3.2.2

- name: "CIS 6.3.2.3 - Ensure system is disabled when audit logs are full"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^space_left_action='
    line: 'space_left_action=email'

- name: "Ensure admin_space_left_action is set to halt"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^admin_space_left_action ='
    line: 'admin_space_left_action = halt'
  notify: Restart auditd
  tags:
    - cis_6.3.2.3

- name: "CIS 6.3.2.4 - Ensure system warns when audit logs are low"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^space_left ='
    line: 'space_left = {{ cis_auditd_space_left | default(75) }}'

- name: "Ensure action when space is low"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^space_left_action ='
    line: 'space_left_action = email'
  notify: Restart auditd
