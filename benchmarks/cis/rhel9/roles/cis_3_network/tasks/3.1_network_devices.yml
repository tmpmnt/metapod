# 3.1.2 Wireless
- name: "CIS 3.1.2 - Disable wireless interfaces"
  ansible.builtin.command: nmcli radio all off
  when: ansible_facts['os_family'] == "RedHat"
  changed_when: false
  tags:
    - cis_3.1.2

# 3.1.3 Bluetooth
- name: "CIS 3.1.3 - Disable bluetooth services"
  ansible.builtin.systemd:
    name: bluetooth
    state: stopped
    enabled: no
  tags:
    - cis_3.1.3

- name: "CIS 3.1.1 - Identity IPv6 status"
  ansible.builtin.debug:
    msg: "Manual: Verify whether IPv6 is required and properly configured"
  tags:
    - cis_3.1.1
    - manual
