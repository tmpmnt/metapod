# NOTE:
# PAM is managed via authselect on RHEL systems
# Do not modify /etc/pam.d/* directly or changes will be overwritten

- name: "CIS 5.3.1 - Ensure PAM packages are installed"
  ansible.builtin.dnf:
    name:
      - pam
      - authselect
      - libpwquality
    state: present
  tags:
    - cis_5.3.1

- name: "Get current authselect profile"
  ansible.builtin.command: authselect current
  register: authselect_current
  changed_when: false
  tags:
    - cis_5.3.2.1

- name: "Ensure authselect profile is set"
  ansible.builtin.command: >
    authselect select sssd with-faillock --force
  when: "'sssd' not in authselect_current.stdout"
  tags:
    - cis_5.3.2.1
    - cis_5.3.2.2

- name: "Ensure faillock is enabled"
  ansible.builtin.command: authselect enable-feature with-faillock
  changed-when: false
  tags:
    - cis_5.3.2.2

- name: "Ensure pwquality is configured"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^minlen'
    line: 'minlen=14'
  tags:
    - cis_5.3.2.3

- name: "Ensure password history is enforced"
  ansible.builtin.lineinfile:
    path: /etc/security/pwhistory.conf
    create: yes
    line: 'remember = 5'
  tags:
    - cis_5.3.2.4

- name: "Apply authselect changes"
  ansible.builtin.command: authselect apply-changes
  changed_when: false
  tags:
    - cis_5.3_apply
