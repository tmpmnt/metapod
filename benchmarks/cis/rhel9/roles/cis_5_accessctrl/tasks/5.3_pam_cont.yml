# 5.3.3 Configure PAM Arguments
# 5.3.3.1 Configure pam_faillock module
- name: "CIS 5.3.3.1 - Configure faillock"
  ansible.builtin.blockinfile:
    path: /etc/security/faillock.conf
    create: yes
    block: |
      deny = 5
      unlock_time = 900
      even_deny_root
  tags:
    - cis_5.3.3.1

# 5.3.3.2 Configure pam_pwquality module
- name: "CIS 5.3.3.2 - Configure pwquality"
  ansible.builtin.blockinfile:
    path: /etc/security/pwquality.conf
    create: yes
    block: |
      minlen = 14
      minclass = 4
      difok = 4
      maxrepeat = 3
      maxsequence = 3
      dictcheck = 1
      enforce_for_root
    tags:
      - cis_5.3.3.2

# 5.3.3.3 Configure pam_pwhistory module
- name: "CIS 5.3.3.3 - Configure password history"
  ansible.builtin.blockinfile:
    path: /etc/security/pwhistory.conf
    create: yes
    block: |
      remember = 5
      enforce_for_root
  tags:
    - cis_5.3.3.3

- name: "Verify use_authtok is enabled"
  ansible.builtin.debug:
    msg: "use_authtok handled by authselect profile"
  tags:
    - cis_5.3.3.3.3

# 5.3.3.4 Configure pam_unix module
- name: "Check for nullok in PAM"
  ansible.builtin.command: grep nullok /etc/pam.d/system-auth
  register: nullok_check
  failed_when: false
  changed_when: false
  tags:
    - cis_5.3.3.4.1

- name: "Report nullok usage"
  ansible.builtin.debug:
    msg: "WARNING: nullok found in PAM config"
  when: nullok_check.stdout != ""

- name: "Ensure strong password hashing algorithm"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^ENCRYPT_METHOD'
    line: 'ENCRYPT_METHOD yescrypt'
  tags:
    - cis_5.3.3.4.3
