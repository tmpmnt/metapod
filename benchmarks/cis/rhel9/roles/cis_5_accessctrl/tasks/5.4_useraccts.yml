# Configure shadow password suite parameters
- name: "CIS 5.4.1.1"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: 'PASS_MAX_DAYS 90'
  tags:
    - cis_5.4.1.1

- name: "Check if minimum password days is configured"
  ansible.builtin.command: grep '^PASS_MIN_DAYS' /etc/login.defs
  register: pass_min_days_check
  changed_when: false
  failed_when: false
  tags:
    - cis_5.4.1.2

- name: "Manual review: Ensure PASS_MIN_DAYS is configured"
  ansible.builtin.debug:
    msg: "Ensure PASS_MIN_DAYS is set according to policy"
  when: pass_min_days_check.stdout == ""

- name: "CIS 5.4.1.3 - Ensure password expiration warning days is configured"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: 'PASS_WARN_AGE 7'

- name: "CIS 5.4.1.4 - Ensure strong password hashing algorithm is configured"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^ENCRYPT_METHOD'
    line: 'ENCRYPT_METHOD yescrypt'
  tags:
    - cis_5.4.1.4

- name: "CIS 5.4.1.5 - Ensure inactive password lock is configured"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PATH_INACTIVE'
    line: 'PASS_INACTIVE 30'
  tags:
    - cis_5.4.1.5

- name: "CIS 5.4.1.6 - Ensure all users' last password change date is in the past"
  ansible.builtin.shell: chage -l {{ item }} | grep -E 'Last password change' | awk '{ print $4 }'
  with_items: "{{ ansible_users }}"
  register: last_pass_change
  changed_when: false
  failed_when: false
  tags:
    - cis_5.4.1.6

# 5.4.2 Configure root and system accounts and environments
- name: "CIS 5.4.2.1 - Ensure root is the only UID 0 account"
  ansible.builtin.shell: "grep ':x:0:' /etc/passwd"
  register: root_uid_check
  failed_when: root_uid_check.stdout != 'root:x:0:0:root:/root:/bin/bash'
  changed_when: false
  tags:
    - cis_5.4.2.1

- name: "CIS 5.4.2.2 - Ensure root is the only GID 0 account"
  ansible.builtin.shell: "grep ':x:0:' /etc/group"
  register: root_gid_check
  failed_when: root_gid_check.stdout != 'root:x:0:'
  changed_when: false
  tags:
    - cis_5.4.2.2

- name: "CIS 5.4.2.3 - Ensure group root is the only GID 0 group"
  ansible.builtin.shell: "grep ':x:0:' /etc/group"
  register: root_gid_check
  failed_when: root_gid_check.stdout != 'root:x:0:'
  changed_when: false
  tags:
    - cis_5.4.2.3

- name: "CIS 5.4.2.4 - Ensure root account access is controlled"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify:
    - Restart sshd
  tags:
    - cis_5.4.2.4

- name: "CIS 5.4.2.5 - Ensure root path integrity"
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: '^PATH'
    line: 'PATH=/sbin:/bin:/usr/sbin:/usr/bin:/root/bin'
  tags:
    - cis_5.4.2.5

- name: "CIS 5.4.2.6 - Ensure root user umask is configured"
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: '^umask'
    line: 'umask 0777'
  tags:
    - cis_5.4.2.6

- name: "CIS 5.4.2.7 - Ensure system accounts do not have a valid login shell"
  ansible.builtin.shell: "awk -F: '$3 < 1000 && $7 != \"nologin\" {print $1}' /etc/passwd"
  register: system_accounts
  changed_when: false
  failed_when: false
  tags:
    - cis_5.4.2.7

- name: "CIS 5.4.2.8 - Ensure accounts without a valid login shell are locked"
  ansible.builtin.user:
    name: "{{ item }}"
    state: locked
  loop: "{{ system_accounts.stdout_lines }}"
  tags:
    - cis_5.4.2.8
      
# 5.4.3 Configure user default environment

- name: "CIS 5.4.3.1 - Ensure nologin is not listen in /etc/shells"
  ansible.builtin.shell: "grep -V '/sbin/nologin' /etc/shells > /etc/shells.new && mv /etc/shells.new /etc/shells"
  tags:
    - cis_5.4.3.1

- name: "CIS 5.4.3.2 - Ensure default user shell timeout is configured"
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: '^TMOUT'
    line: 'TMOUT=600'
  tags:
    - cis_5.4.3.2

- name: "CIS 5.4.3.3 - Ensure default user umask is configured"
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: '^umask'
    line: 'umask 0777'
  tags:
    - cis_5.4.3.3
